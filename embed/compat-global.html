<!--
  ГЛОБАЛЬНИЙ скрипт "Сумісні моделі" для Horoshop.
  Ставиться ОДИН раз у глобальне місце теми (там, де вже стоїть твій скрипт оформлення
  таблиці) — і сам додає блок пошуку сумісності у вкладку «Сумісні моделі» на ВСІХ товарах.

  Що робить на кожній сторінці товару:
    • читає артикул з <meta itemprop="sku"> (є на кожній картці товару);
    • знаходить вкладку «Сумісні моделі» / «Совместимые модели» за назвою;
    • ховає стару таблицю у ній і ставить двоколонковий блок пошуку (двомовний: ua/ru за URL);
    • якщо вкладки чи артикулу немає — тихо нічого не робить.

  НАЛАШТУВАННЯ: у рядку CONFIG нижче встав домен свого models-api.
-->
<script>
(function(){
  var CONFIG = {
    API: 'https://YOUR-models-api.up.railway.app',   // ← домен models-api
    MIN: 3,
    PREVIEW: 8,
    TAB_TITLES: ['сумісні моделі','совместимые модели','совместимость с моделями','сумісність з моделями']
  };

  function boot(){ try { init(); } catch(e){ /* тихо */ } }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot); else boot();

  function norm2(s){ return String(s||'').toLowerCase().replace(/\s+/g,' ').trim(); }

  function findPanel(){
    // 1) за назвою таба → його панель за data-content-id
    var tabs = document.querySelectorAll('.product-heading__tab, [class*="heading__tab"]');
    for(var i=0;i<tabs.length;i++){
      var tt = norm2(tabs[i].textContent);
      if(CONFIG.TAB_TITLES.indexOf(tt) >= 0){
        var id = (tabs[i].getAttribute('href')||'').replace(/^#/,'');
        if(id){
          var byData = document.querySelector('[data-content-id="'+id+'"]');
          if(byData) return byData;
          var byId = document.getElementById(id);
          if(byId) return byId;
        }
      }
    }
    // 2) запасний варіант: панель, що містить вступ таблиці сумісності
    var blocks = document.querySelectorAll('[data-content-id], .j-product-block__tab, .product__section');
    for(var j=0;j<blocks.length;j++){
      var tx = norm2(blocks[j].textContent).slice(0,80);
      if(/сум[іи]сн|совмест/.test(tx) && /модел/.test(tx)) return blocks[j];
    }
    return null;
  }

  function init(){
    if(!CONFIG.API || /YOUR-models-api/.test(CONFIG.API)) return;      // не налаштовано
    var meta = document.querySelector('meta[itemprop="sku"]');
    var SKU = meta ? String(meta.getAttribute('content')||'').trim() : '';
    if(!SKU) return;
    var panel = findPanel();
    if(!panel || panel.getAttribute('data-lc-done')) return;
    panel.setAttribute('data-lc-done','1');

    var mount = document.createElement('div');
    mount.className = 'lartek-compat-mount';
    panel.innerHTML = '';
    panel.appendChild(mount);
    render(mount, CONFIG.API, SKU, CONFIG.MIN, CONFIG.PREVIEW);
  }

  // ── Рендер блоку (та сама логіка, що й у compat-widget.html) ──
  function render(root, API, SKU, MIN, PREVIEW){
    API = String(API||'').replace(/\/+$/,'');
    var isRu = /^\/ru(\/|$)/.test(location.pathname);
    var T = isRu ? {
      title:'Подходит к моделям:', brandLabel:'Выберите бренд техники',
      quickLabel:'Введите модель для быстрого поиска',
      qph:'Модель или индустриальный код, минимум '+MIN+' символа',
      forms:['модель','модели','моделей'], other:'Другие',
      shownOf:function(n,t){return 'Показано '+n+' из '+t+'. Чтобы проверить свою модель — воспользуйтесь поиском справа.';},
      minChars:function(m){return 'Минимум '+m+' символа.';},
      searching:'Ищу…', tooMany:'Слишком много совпадений — уточните запрос.',
      notFound:function(x){return '✕ Модели «'+x+'» нет в списке совместимых';},
      fits:'✓ Подходит к вашему прибору', incTitle:'⚠ Уточните полный код модели',
      incHint:'Введён неполный код. Цифры после «/» важны — именно они определяют совместимость. Проверьте точный код на шильдике прибора.',
      foundHint:'Похожие модели — найдите свою точную в списке:',
      help:'Здесь отображены совместимые модели для этой запчасти. Выберите бренд техники, затем введите модель прибора. Если позиция совместима с вашим прибором — ваша модель обязательно отобразится в списке. Если вашей модели нет — <b>свяжитесь с нами</b>.',
      listUpdating:'Список уточняется.', loadFail:'Не удалось загрузить. Воспользуйтесь поиском справа.',
      loading:'Загрузка…', loadErr:'Ошибка загрузки.', checkFail:'Не удалось проверить. Попробуйте ещё.'
    } : {
      title:'Підходить до моделей:', brandLabel:'Виберіть бренд техніки',
      quickLabel:'Введіть модель для швидкого пошуку',
      qph:'Модель або індустріальний код, мінімум '+MIN+' символи',
      forms:['модель','моделі','моделей'], other:'Інші',
      shownOf:function(n,t){return 'Показано '+n+' з '+t+'. Щоб перевірити свою модель — скористайтесь пошуком праворуч.';},
      minChars:function(m){return 'Мінімум '+m+' символи.';},
      searching:'Шукаю…', tooMany:'Забагато збігів — уточніть запит.',
      notFound:function(x){return '✕ Моделі «'+x+'» немає у списку сумісних';},
      fits:'✓ Підходить до вашого приладу', incTitle:'⚠ Уточніть повний код моделі',
      incHint:'Введено неповний код. Цифри після «/» важливі — саме вони визначають сумісність. Перевірте точний код на шильдику приладу.',
      foundHint:'Схожі моделі — знайдіть свою точну у списку:',
      help:'Тут відображено сумісні моделі для цієї запчастини. Оберіть бренд техніки, потім введіть модель приладу. Якщо позиція сумісна з вашим приладом — ваша модель обов’язково відобразиться у списку. Якщо вашої моделі немає — <b>зв’яжіться з нами</b>.',
      listUpdating:'Список уточнюється.', loadFail:'Не вдалося завантажити. Скористайтесь пошуком праворуч.',
      loading:'Завантаження…', loadErr:'Помилка завантаження.', checkFail:'Не вдалося перевірити. Спробуйте ще.'
    };

    if(!document.getElementById('lartek-compat-style')){
      var st=document.createElement('style'); st.id='lartek-compat-style';
      st.textContent=''
      +'.lcw{--ok:#1a7f37;--bad:#b42318;--bd:#e3e6ea;--mut:#6b7280;--hd:#7a8a99;font-family:Arial,Helvetica,sans-serif;color:#1f2328;line-height:1.4;max-width:1100px}'
      +'.lcw-title{font-size:22px;color:var(--hd);font-weight:400;padding-bottom:10px;border-bottom:1px solid var(--bd);margin-bottom:16px}'
      +'.lcw-total{font-size:14px;color:var(--mut)}'
      +'.lcw-cols{display:grid;grid-template-columns:1fr 1fr;gap:28px}'
      +'.lcw-label{display:block;font-size:13px;color:var(--hd);margin:0 0 6px}'
      +'.lcw-mut{color:var(--mut);font-size:12px}'
      +'.lcw-inwrap{position:relative;margin:8px 0}'
      +'.lcw-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5;font-size:14px}'
      +'.lcw select,.lcw-input{width:100%;box-sizing:border-box;font-size:15px;padding:11px 12px;border:1px solid var(--bd);border-radius:8px;background:#fff;outline:none;font-family:inherit}'
      +'.lcw-input--ico{padding-left:36px}'
      +'.lcw select:focus,.lcw-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}'
      +'.lcw-list{list-style:none;margin:8px 0 0;padding:0;max-height:320px;overflow-y:auto;border:1px solid var(--bd);border-radius:8px}'
      +'.lcw-list li{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;font-size:14px;border-top:1px solid #eef1f4}'
      +'.lcw-list li:first-child{border-top:0}'
      +'.lcw-model{font-weight:600}'
      +'.lcw-brand{color:var(--mut);font-weight:400;margin-right:6px}'
      +'.lcw-check{color:var(--ok);font-weight:700;flex:0 0 auto}'
      +'.lcw-list mark{background:#fff3bf;padding:0 1px;border-radius:2px}'
      +'.lcw-empty{padding:12px;color:var(--mut);font-size:14px}'
      +'.lcw-result{margin:4px 0 12px;min-height:2px}'
      +'.lcw-banner{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;padding:10px 12px;border-radius:8px;margin-bottom:8px}'
      +'.lcw-banner.ok{background:#eaf6ec;color:var(--ok);border:1px solid #bfe3c6}'
      +'.lcw-banner.bad{background:#fdecea;color:var(--bad);border:1px solid #f3c1bb}'
      +'.lcw-banner.info{background:#f2f4f7;color:#374151;border:1px solid var(--bd)}'
      +'.lcw-banner.warn{background:#fff8e6;color:#8a6d00;border:1px solid #f2df9e}'
      +'.lcw-help{font-size:13px;color:#4b5563;line-height:1.55}'
      +'.lcw-hint{font-size:13px;color:var(--mut);padding:4px 2px}'
      +'@media(max-width:720px){.lcw-cols{grid-template-columns:1fr;gap:22px}.lcw-title{font-size:19px}}';
      document.head.appendChild(st);
    }

    root.className='lcw';
    root.innerHTML=''
      +'<div class="lcw-title">'+T.title+' <span class="lcw-total"></span></div>'
      +'<div class="lcw-cols">'
      +  '<div><label class="lcw-label">'+T.brandLabel+'</label>'
      +    '<select class="lcw-brand" aria-label="'+T.brandLabel+'"></select>'
      +    '<div class="lcw-blist"></div></div>'
      +  '<div><div class="lcw-label">'+T.quickLabel+' <span class="lcw-mut lcw-qcount"></span></div>'
      +    '<div class="lcw-inwrap"><span class="lcw-ico">🔍</span><input class="lcw-input lcw-input--ico lcw-qinput" type="search" autocomplete="off" spellcheck="false" placeholder="'+T.qph+'"></div>'
      +    '<div class="lcw-result lcw-qresult"></div>'
      +    '<div class="lcw-help">'+T.help+'</div></div>'
      +'</div>';

    var q=function(c){ return root.querySelector('.'+c); };
    var elTotal=q('lcw-total'), elQcount=q('lcw-qcount'), elBrand=q('lcw-brand'),
        elBlist=q('lcw-blist'), elQinput=q('lcw-qinput'), elQresult=q('lcw-qresult');
    var setText=function(el,t){ if(el) el.textContent=t; };
    var setHtml=function(el,h){ if(el) el.innerHTML=h; };
    function norm(s){ return String(s||'').toUpperCase().replace(/[^A-Z0-9]/g,''); }
    // У полі «код» може бути кілька кодів через кому/«;» — точний збіг за будь-яким із них.
    function codeHit(code,qn){ return !!code && String(code).split(/[,;]/).some(function(c){ return norm(c)===qn; }); }
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
    function api(path){ return fetch(API+path,{headers:{'Accept':'application/json'}}).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }); }
    function plural(n,f){ var a=n%10,b=n%100; return (a===1&&b!==11)?f[0]:(a>=2&&a<=4&&(b<10||b>=20))?f[1]:f[2]; }
    function nModels(n){ return n+' '+plural(n,T.forms); }
    function hi(model,qn){ var s=esc(model); if(!qn) return s;
      var nm='',map=[]; for(var i=0;i<model.length;i++){var c=model[i].toUpperCase(); if(/[A-Z0-9]/.test(c)){nm+=c;map.push(i);}}
      var at=nm.indexOf(qn); if(at<0) return s; var f=map[at],t=map[at+qn.length-1];
      return esc(model.slice(0,f))+'<mark>'+esc(model.slice(f,t+1))+'</mark>'+esc(model.slice(t+1)); }
    function li(it,qn,sb){ return '<li><span>'+(sb?'<span class="lcw-brand">'+esc(it.brand)+'</span>':'')+'<span class="lcw-model">'+hi(it.model,qn)+'</span></span><span class="lcw-check">✓</span></li>'; }
    function listHtml(items,qn,sb){ return items.length ? items.map(function(it){return li(it,qn,sb);}).join('') : '<div class="lcw-empty">—</div>'; }

    if(!SKU){ setText(elTotal,''); return; }
    var BRAND_COUNT={};
    (function loadBrands(){
      api('/api/brands?sku='+encodeURIComponent(SKU)).then(function(d){
        var brands=d.brands||[], total=d.total|0;
        setText(elTotal,'('+nModels(total)+')'); setText(elQcount,'('+nModels(total)+')');
        if(!brands.length){ setHtml(elBrand,'<option>—</option>'); setHtml(elBlist,'<div class="lcw-empty">'+T.listUpdating+'</div>'); return; }
        brands.forEach(function(b){ BRAND_COUNT[b.brand]=b.count; });
        setHtml(elBrand, brands.map(function(b){ return '<option value="'+esc(b.brand)+'">'+esc(b.brand||T.other)+' ('+b.count+')</option>'; }).join(''));
        loadBrandModels();
      }).catch(function(){ setText(elTotal,''); setHtml(elBlist,'<div class="lcw-empty">'+T.loadFail+'</div>'); });
    })();
    function loadBrandModels(){
      if(!elBrand) return;
      var brand=elBrand.value;
      setHtml(elBlist,'<div class="lcw-empty">'+T.loading+'</div>');
      api('/api/models?sku='+encodeURIComponent(SKU)+'&brand='+encodeURIComponent(brand)).then(function(d){
        var items=(d.items||[]).slice(0,PREVIEW);
        var total=BRAND_COUNT[brand]!=null?BRAND_COUNT[brand]:items.length;
        var more=total-items.length;
        var ul='<ul class="lcw-list">'+listHtml(items,'',false)+'</ul>';
        var note=more>0 ? '<div class="lcw-hint">'+T.shownOf(items.length, nModels(total))+'</div>' : '';
        setHtml(elBlist, ul+note);
      }).catch(function(){ setHtml(elBlist,'<div class="lcw-empty">'+T.loadErr+'</div>'); });
    }
    var qTimer=null,qLast='';
    function onQuick(){
      var raw=elQinput.value, qn=norm(raw);
      if(qn===qLast) return; qLast=qn; clearTimeout(qTimer);
      if(qn.length<MIN){ setHtml(elQresult, raw?'<div class="lcw-hint">'+T.minChars(MIN)+'</div>':''); return; }
      qTimer=setTimeout(function(){
        setHtml(elQresult,'<div class="lcw-hint">'+T.searching+'</div>');
        api('/api/models?sku='+encodeURIComponent(SKU)+'&q='+encodeURIComponent(raw)).then(function(d){
          if(norm(elQinput.value)!==qn) return;
          if(d.tooMany){ setHtml(elQresult,'<div class="lcw-banner info">'+T.tooMany+'</div>'); return; }
          var items=d.items||[];
          if(!items.length){ setHtml(elQresult,'<div class="lcw-banner bad">'+T.notFound(esc(raw.trim()))+'</div>'); return; }
          var exact=items.filter(function(it){ return norm(it.model)===qn || codeHit(it.code,qn); });
          if(exact.length){ setHtml(elQresult,'<div class="lcw-banner ok">'+T.fits+'</div><ul class="lcw-list">'+listHtml(exact,qn,true)+'</ul>'); }
          else { setHtml(elQresult,'<div class="lcw-hint">'+T.foundHint+'</div><ul class="lcw-list">'+listHtml(items,qn,true)+'</ul>'); }
        }).catch(function(){ setHtml(elQresult,'<div class="lcw-hint">'+T.checkFail+'</div>'); });
      },180);
    }
    if(elBrand) elBrand.addEventListener('change', loadBrandModels);
    if(elQinput) elQinput.addEventListener('input', onQuick);
  }
})();
</script>
