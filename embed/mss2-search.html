  }
  function multiSearch(queries){
    return fetch(HOST+'/multi-search',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},body:JSON.stringify({queries:queries})})
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }).then(function(d){ return d.results||[]; });
  }
  function filters(cat){ var c=(cat!==undefined?cat:state.filterVal); return c?['category = '+JSON.stringify(c)]:undefined; }
  function sortArr(){ return state.canSort?['available:desc']:undefined; }

  function loadFacets(){
    if(!state.q){ side.innerHTML=''; if(gridEl) gridEl.classList.add('mss2-noside'); hideCatToggle(); state.total=0; return Promise.resolve(); }
    return search({q:qNorm(),limit:0,facets:['category'],matchingStrategy:'all'}).then(function(d){ state.catAvailable=true; return d; })
      .catch(function(){ state.catAvailable=false; return search({q:qNorm(),limit:0,matchingStrategy:'all'}); })
      .then(function(d){
        state.catDist=(d.facetDistribution&&d.facetDistribution.category)||{};
        state.total=d.estimatedTotalHits||0; renderSide();
        noteEl.textContent=(state.catAvailable===false)?'категорії з\'являться після оновлення каталогу':'';
      }).catch(function(){});
  }
  // мобільний трей категорій
  function showCatToggle(n){ if(!catToggle) return; catToggle.classList.add('mss2-show'); var l=catToggle.querySelector('.mss2-catlabel-t'); if(l) l.textContent='Категорії ('+n+')'; }
  function hideCatToggle(){ if(!catToggle) return; catToggle.classList.remove('mss2-show'); closeCatTray(); }
  function closeCatTray(){ if(gridEl) gridEl.classList.remove('mss2-catopen'); if(catToggle){ var a=catToggle.querySelector('.mss2-arw'); if(a) a.textContent='▾'; } }
  function renderSide(){
    var entries=Object.entries(state.catDist).filter(function(e){return e[0]!=='';}).sort(function(a,b){return b[1]-a[1];}).slice(0,60);
    var html='<h3>Категорії</h3><div class="mss2-cat '+(!state.filterVal?'mss2-active':'')+'" data-v=""><span class="mss2-catlabel"><span class="mss2-ico">📦</span><span>Всі результати</span></span><span class="mss2-cnt">'+state.total+'</span></div>';
    entries.forEach(function(e){ html+='<div class="mss2-cat '+(state.filterVal===e[0]?'mss2-active':'')+'" data-v="'+esc(e[0])+'"><span class="mss2-catlabel">'+catIco(e[0])+'<span>'+esc(e[0])+'</span></span><span class="mss2-cnt">'+e[1]+'</span></div>'; });
    side.innerHTML=html; if(gridEl) gridEl.classList.remove('mss2-noside');
    showCatToggle(entries.length);
    side.querySelectorAll('.mss2-cat').forEach(function(el){ el.onclick=function(){ state.filterVal=el.getAttribute('data-v')||null; markActive(); closeCatTray(); runSearch(true); }; });
  }
  function markActive(){ side.querySelectorAll('.mss2-cat').forEach(function(el){ var v=el.getAttribute('data-v')||null; el.classList.toggle('mss2-active',v===state.filterVal); }); }
  function grouped(){ return state.q && !state.filterVal; }

  function runSearch(reset){
    if(!state.q){ renderRecentOrEmpty(); countEl.textContent='Почни вводити запит'; return Promise.resolve(); }
    return grouped()?renderGrouped():renderFlat(reset);
  }

  function renderFlat(reset){
    if(reset){ state.offset=0; state.hits=[]; state.kbd=-1; }
    var body={q:qNorm(),limit:state.limit,offset:state.offset,matchingStrategy:'all'}; var s=sortArr(); if(s) body.sort=s;
    var f=filters(); if(f) body.filter=f;
    return searchSafe(body).then(function(d){
      state.total=d.estimatedTotalHits||0;
      state.hits=reset?d.hits:state.hits.concat(d.hits);
      countEl.textContent='Знайдено: '+state.total;
      if(reset&&state.hits.length) pushRecent(state.q);
      var html='';
      if(!state.hits.length){ html='<div class="mss2-empty">Нічого не знайдено за «'+esc(state.q)+'».</div>'; }
      else{
        html='<div class="mss2-cards">';
        var prevAvail=null;
        state.hits.forEach(function(h){
          var a=!!h.available;
          if(state.canSort && a!==prevAvail){
            html+='<div class="mss2-sep"><span class="mss2-dot '+(a?'ok':'off')+'"></span>'+(a?'В наявності':'Немає в наявності')+'</div>';
            prevAvail=a;
          }
          html+=card(h);
        });
        html+='</div>';
        if(state.hits.length<state.total) html+='<button class="mss2-more" id="mss2-more">Показати ще ('+(state.total-state.hits.length)+')…</button>';
      }
      results.innerHTML=html; bindCards();
      var m=results.querySelector('#mss2-more'); if(m) m.onclick=function(){ state.offset+=state.limit; renderFlat(false); };
    }).catch(function(e){ results.innerHTML='<div class="mss2-empty">Помилка з\'єднання ('+e.message+').</div>'; });
  }

  function renderGrouped(){
    var cats=Object.entries(state.catDist).filter(function(e){return e[0]!=='';}).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
    if(!cats.length) return renderFlat(true);
    var s=sortArr();
    var queries=cats.map(function(c){ var qy={indexUid:INDEX,q:qNorm(),limit:4,filter:filters(c[0]),matchingStrategy:'all'}; if(s) qy.sort=s; return qy; });
    return multiSearch(queries).then(function(res){
      state.kbd=-1; countEl.textContent='Знайдено: '+state.total; pushRecent(state.q);
      var html='<div class="mss2-blocks">';
      cats.forEach(function(c,i){
        var hits=(res[i]&&res[i].hits)||[]; if(!hits.length) return;
        var cimg=hits[0]&&hits[0].picture;
        var head='<span class="mss2-bhname">'+(cimg?'<img class="mss2-catimg" src="'+thumb(cimg,72)+'" onerror="this.style.display=\'none\'">':'')+'<b>'+esc(c[0])+'</b></span>';
        html+='<div class="mss2-block"><div class="mss2-bh" data-v="'+esc(c[0])+'">'+head+'<span class="mss2-arr">Показати всі ('+c[1]+') ›</span></div>';
        hits.forEach(function(h){ html+=card(h); });
        html+='</div>';
      });
      html+='</div>';
      if(html==='<div class="mss2-blocks"></div>') html='<div class="mss2-empty">Нічого не знайдено за «'+esc(state.q)+'».</div>';
      results.innerHTML=html; bindCards();
      results.querySelectorAll('[data-v]').forEach(function(el){ el.onclick=function(){ state.filterVal=el.getAttribute('data-v'); markActive(); runSearch(true); }; });
    }).catch(function(){ return renderFlat(true); });
  }

  function card(h){
    var pic=h.picture?('<img class="mss2-thumb" loading="lazy" src="'+thumb(h.picture,120)+'" onerror="this.outerHTML=\'<div class=mss2-ph>—</div>\'">'):'<div class="mss2-ph">—</div>';
    var av=h.available?'<span class="mss2-av ok"><span class="mss2-dot ok"></span> В наявності</span>':'<span class="mss2-av off"><span class="mss2-dot off"></span> Немає в наявності</span>';
    var price=h.price?(fmt(h.price)+' грн'):'ціна за запитом';
    var art=h.sku?(' · <span class="mss2-art" data-a="'+esc(h.sku)+'">Код: '+esc(h.sku)+'</span>'):'';
    var url=h.url||'#';
    var cls=h.available?'mss2-item':'mss2-item mss2-off';
    return '<div class="'+cls+'" data-url="'+esc(url)+'">'+pic
      +'<div class="mss2-info"><a class="mss2-name" href="'+esc(url)+'">'+esc(h.name)+'</a>'
      +'<div class="mss2-price">'+price+'</div><div class="mss2-status">'+av+art+'</div></div></div>';
  }
  function bindCards(){ results.querySelectorAll('.mss2-art').forEach(function(el){ el.onclick=function(ev){ ev.preventDefault(); ev.stopPropagation(); if(navigator.clipboard) navigator.clipboard.writeText(el.getAttribute('data-a')); toast('Код скопійовано: '+el.getAttribute('data-a')); }; }); }

  function getRecent(){ try{ return JSON.parse(localStorage.getItem('ms_recent')||'[]'); }catch(e){ return []; } }
  function pushRecent(v){ try{ if(!v||v.length<2)return; var r=getRecent().filter(function(x){return x!==v;}); r.unshift(v); localStorage.setItem('ms_recent',JSON.stringify(r.slice(0,8))); }catch(e){} }
  function renderRecentOrEmpty(){
    var r=getRecent();
    if(gridEl) gridEl.classList.add('mss2-noside'); hideCatToggle();
    if(!r.length){ if(gridEl) gridEl.style.display='none'; return; } // нема історії — лише поле пошуку
    if(gridEl) gridEl.style.display='';                              // є історія — показуємо панель
    var html='<div class="mss2-rt">Останні запити</div><div class="mss2-chips">';
    r.forEach(function(v){ html+='<span class="mss2-chip" data-q="'+esc(v)+'">'+esc(v)+'</span>'; });
    html+='</div>';
    if(side) side.innerHTML='';
    results.innerHTML=html;
    results.querySelectorAll('.mss2-chip').forEach(function(c){ c.onclick=function(){ q.value=c.getAttribute('data-q'); onInput(); }; });
  }

  function onInput(){
    state.q=q.value.trim(); state.filterVal=null;
    clearTimeout(timer);
    timer=setTimeout(function(){
      state.offset=0;
      if(!state.q){ countEl.textContent='Почни вводити запит'; renderRecentOrEmpty(); return; }
      if(gridEl) gridEl.style.display=''; loadFacets().then(function(){ runSearch(true); });
    },150);
    // аналітика: лог «завершеного» запиту після паузи (не кожну літеру)
    clearTimeout(logTimer);
    logTimer=setTimeout(logSearch, 1200);
  }
  function logSearch(){
    if(!LOG_URL) return;
    var qq=state.q; if(!qq || qq.length<2) return;
    try{
      fetch(LOG_URL, { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ q: qq, hits: state.total, source: 'site' }), keepalive:true }).catch(function(){});
    }catch(e){}
  }

  // --- Тригер: відкривати модалку з поля пошуку сайту (десктоп + мобільний) ---
  // Десктоп: input.search__input / .search__button. Мобільний: #search-input у .search__field, лупа .search__toggle.
  var INPUT_SEL='input.search__input, #search-input, .search__field input, .search input[type="text"], .search input[name="q"]';
  var TOGGLE_SEL='.search__toggle, .search__button';
  function isInput(t){ return t && t.matches && t.matches(INPUT_SEL); }
  function siteInputVal(){ var el=document.querySelector(INPUT_SEL); return el?el.value:''; }
  document.addEventListener('focusin', function(e){ if(isInput(e.target)) open(e.target.value||''); }, true);
  document.addEventListener('click', function(e){
    var t=e.target; if(!t||!t.closest) return;
    if(isInput(t)){ open(t.value||''); return; }
    var tg=t.closest(TOGGLE_SEL);
    if(tg){ e.preventDefault(); e.stopPropagation(); open(siteInputVal()); }
  }, true);
})();
</script>
